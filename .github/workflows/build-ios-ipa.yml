name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: agos_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Flutter clean
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA (no codesign)
        run: |
          flutter build ipa \
            --release \
            --no-codesign \
            -v

      - name: Find IPA file
        run: find build -name "*.ipa" -o -name "*.xcarchive" 2>/dev/null || echo "No IPA or XCArchive found"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build
          path: agos_app/build/ios/archive/
          retention-days: 7
          if-no-files-found: warn

