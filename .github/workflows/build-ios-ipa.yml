name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: agos_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"

      - name: Flutter clean
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA (no codesign)
        run: |
          flutter build ipa \
            --release \
            --no-codesign \
            -v

      - name: Export IPA from Archive
        run: |
          echo "=== Creating proper IPA structure ==="
          mkdir -p build/ios/ipa/Payload
          
          # Copy app to Payload directory
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          
          # Create IPA file with proper structure
          cd build/ios/ipa
          zip -r Runner.ipa Payload/
          cd ../../../

      - name: Find IPA file
        run: find build -name "*.ipa" 2>/dev/null | head -5 || echo "No IPA found"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: agos_app/build/ios/ipa/*.ipa
          retention-days: 7
          if-no-files-found: warn

