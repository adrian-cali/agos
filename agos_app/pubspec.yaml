name: agos_app
description: AGOS - Water Monitoring System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  web_socket_channel: ^2.4.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  percent_indicator: ^4.2.3
  flutter_svg: ^2.2.3
  device_preview: ^1.2.0
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  pdf: ^3.11.2
  printing: ^5.14.2
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.2
  timezone: ^0.10.0
  flutter_blue_plus: ^1.32.12
  flutter_bluetooth_classic_serial: ^1.3.2
  wifi_scan: ^0.4.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/agos_app_icon_1024.png"
  adaptive_icon_background: "assets/images/agos_app_icon_1024.png"
  adaptive_icon_foreground: "assets/images/agos_app_icon_1024.png"
  adaptive_icon_foreground_inset: 18
  windows:
    generate: true
    image_path: "assets/images/agos_app_icon_1024.png"
    icon_size: 48

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/agos_app_splash_icon_1024.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    image: assets/images/agos_app_splash_icon_1024.png

dependency_overrides:
  path: ^1.9.1

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/images/
    - assets/images/dev_team/
