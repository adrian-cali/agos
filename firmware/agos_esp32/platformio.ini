; PlatformIO project configuration for AGOS ESP32 firmware
; Open this folder in VS Code with PlatformIO extension installed.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Required libraries
; NOTE: Do NOT add the "ESP32 BLE Arduino" library here — BLE is built into
;       the ESP32 Arduino framework automatically.
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    links2004/WebSockets @ ^2.4.0
    paulstoffregen/OneWire @ ^2.3.0
    milesburton/DallasTemperature @ ^3.9.0

; Partition scheme that includes BLE (default 4MB includes BLE)
board_build.partitions = default.csv

; Upload speed
upload_speed = 921600
